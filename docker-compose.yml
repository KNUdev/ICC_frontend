services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: icc-website:latest
    container_name: icc-website
    env_file:
      - .env
    environment:
      NODE_ENV: production
      HOSTNAME: 0.0.0.0
      PORT: 3000
      NEXT_TELEMETRY_DISABLED: 1
    ports:
      - "${APP_PORT:-3000}:3000"
    restart: unless-stopped
